server.port=${PORT:8085}
site.domain=http://localhost:${server.port}
logging.level.org.atmosphere=warn
server.servlet.session.persistent=false


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# Launch the default browser when starting the application in development mode
vaadin.launch-browser=false

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.example


spring.profiles.active=test



#vaadin.copilot.enabled=false
vaadin.copilot.enable=false
vaadin.productionMode=false
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

image.background=https://img.goodfon.com/original/3840x2160/3/e5/porsche-car-cars-sport-car-high-performance-performance-se-3.jpg


stripe.publishable-key=
stripe.secret-key=

# Configure these values to send real emails. Without SMTP, emails are written to the application log.

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=